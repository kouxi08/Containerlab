# topology documentation: http://containerlab.dev/lab-examples/srl-ceos/
name: mpls

topology:
  nodes:
    R1: 
      kind: juniper_vjunosrouter 
      image: vrnetlab/juniper_vjunos-router:24.2R1-S2.5 
    R2: 
      kind: juniper_vjunosrouter 
      image: vrnetlab/juniper_vjunos-router:24.2R1-S2.5 
    R3: 
      kind: juniper_vjunosrouter 
      image: vrnetlab/juniper_vjunos-router:24.2R1-S2.5 
    R4: 
      kind: juniper_vjunosrouter 
      image: vrnetlab/juniper_vjunos-router:24.2R1-S2.5 
    PE1:
      kind: juniper_vjunosrouter 
      image: vrnetlab/juniper_vjunos-router:24.2R1-S2.5 
    PE2:
      kind: juniper_vjunosrouter 
      image: vrnetlab/juniper_vjunos-router:24.2R1-S2.5 
  links:
    - endpoints: ["R1:ge-0/0/0","R2:ge-0/0/0" ] 
    - endpoints: ["R1:ge-0/0/2","R3:ge-0/0/2" ]  
    - endpoints: ["R1:ge-0/0/1","PE1:ge-0/0/0" ]  
    - endpoints: ["R2:ge-0/0/1","PE2:ge-0/0/0" ] 
    - endpoints: ["R2:ge-0/0/2","R4:ge-0/0/2" ] 
    - endpoints: ["R3:ge-0/0/0","PE1:ge-0/0/1" ]
    - endpoints: ["R3:ge-0/0/1","R4:ge-0/0/1" ]
    - endpoints: ["R4:ge-0/0/0","PE2:ge-0/0/1" ]

     
     
     
     
